name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Pytest — API
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: deepfake_db
          POSTGRES_USER: deepfake_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          [ -f api/requirements.txt ] && pip install -r api/requirements.txt || true

      - name: Run API tests
        run: pytest api/tests/ -v --tb=short
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+psycopg2://deepfake_user:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/deepfake_db
          POSTGRES_DB: deepfake_db
          POSTGRES_USER: deepfake_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  test-ml:
    name: Pytest — ML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest numpy pydantic Pillow
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers retina-face tf-keras

      - name: Run ML tests
        run: pytest ml/tests/test_detection.py -v --tb=short
        env:
          PYTHONPATH: .