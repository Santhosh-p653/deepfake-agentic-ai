
version: "3.9"

services:
  api:
    build: {context: ".", dockerfile: "Dockerfile.api"}
    ports: ["8000:8000"]
    env_file: [".env"]
    depends_on: ["db", "minio"]
    networks: ["bridge_network"]
    volumes:
      - ./logs:/app/logs
      - uploads_data:/app/uploads

  agents:
    build: {context: ".", dockerfile: "Dockerfile.agents"}
    env_file: [".env"]
    depends_on: ["api", "ml"]
    ports: ["8123:8123"]
    networks: ["bridge_network"]
    volumes:
      - ./logs:/app/logs

  ml:
    build: {context: ".", dockerfile: "Dockerfile.ml"}
    env_file: [".env"]
    networks: ["bridge_network"]
    ports: ["8001:8001"]
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs               # added — ml logs now reach log_filter

  db:
    image: "postgres:15"
    restart: "always"
    env_file: [".env"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    networks: ["bridge_network"]

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes: ["minio_data:/data"]
    networks: ["bridge_network"]

  dozzle:
    image: amir20/dozzle:latest
    ports: ["8080:8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: ["bridge_network"]

  beszel:
    image: henrygd/beszel:latest
    ports: ["8090:8090"]
    volumes:
      - beszel_data:/beszel_data
    networks: ["bridge_network"]

  beszel-agent:
    image: henrygd/beszel-agent:latest
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=45876
      - KEY=${BESZEL_KEY}

volumes:
  postgres_data: {}
  minio_data: {}
  beszel_data: {}
  uploads_data: {}
networks:
  bridge_network:
    driver: bridge
